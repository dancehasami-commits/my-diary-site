<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>みんなの日記｜匿名で投稿できる日記サイト</title>
<meta name="description" content="匿名で日記を投稿できるシンプルなサイト。画像投稿やいいね機能あり。">

<meta property="og:title" content="みんなの日記">
<meta property="og:description" content="匿名で日記を投稿できるサイト">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dancehasami-commits.github.io/my-diary-site/">
<meta property="og:image" content="https://dancehasami-commits.github.io/my-diary-site/trimmed_ogp_image.png">
<meta name="twitter:card" content="summary_large_image">

<style>
body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
header { background: #111; color: #fff; padding: 30px; text-align: center; }
.banner { width: 100%; height: 200px; background-image: url("banner1.png"); background-size: cover; }

.marquee {
  background: black; color: lime; overflow: hidden;
  font-family: monospace; text-shadow: 0 0 8px lime;
}
.marquee p {
  white-space: nowrap; display: inline-block;
  padding-left: 100%; animation: scroll 15s linear infinite;
}
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

.container { display: flex; }
.side { flex: 1.5; }
.main { flex: 7; background: white; padding: 20px; }

.post {
  margin-bottom: 20px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
  position: relative;
}

.post img { width: 100%; margin-bottom: 10px; }

.meta { font-size: 12px; color: #666; }
.datetime {
  font-size: 11px;
  color: #999;
  position: absolute;
  right: 0;
  bottom: 5px;
}

textarea, input, select {
  width: 100%;
  margin-bottom: 5px;
}

#postBtn {
  width: 200%;
  max-width: 400px;
  height: 60px;
  font-size: 18px;
  background: #111;
  color: white;
  border: none;
}

.share-btn {
  width: 18px;
  height: 18px;
  margin-left: 8px;
  opacity: 0.5;
}
.share-btn:hover { opacity: 1; }

@media screen and (max-width: 768px) {
  .container { flex-direction: column; }
  .side { display: none; }
  #postBtn { width: 100%; }
}
</style>
</head>

<body>

<header>
<h1>みんなの日記</h1>
<p>匿名で日記を書いて共有できるサイト</p>
</header>

<div class="banner"></div>

<div class="marquee">
<p id="marqueeText">読み込み中...</p>
</div>

<div class="container">
<div class="side"></div>

<div class="main">

<input type="text" id="name" placeholder="名前">
<textarea id="text" placeholder="日記を書く"></textarea>
<input type="file" id="image">

<button id="postBtn">投稿</button>

<select id="sort">
<option value="new">最新順</option>
<option value="like">いいね順</option>
</select>

<hr>
<section id="list"></section>

</div>
<div class="side"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc,
  doc, runTransaction, onSnapshot, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 Firebase（そのまま） */
const firebaseConfig = {
  apiKey: "AIzaSyATX-E11u6N_Z4YI_vxW4fsASJeuDHkrX4",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const list = document.getElementById("list");

/* ユーザーID */
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = crypto.randomUUID();
  localStorage.setItem("userId", userId);
}

/* 投稿 */
document.getElementById("postBtn").onclick = async () => {
  const name = document.getElementById("name").value || "名前無し";
  const text = document.getElementById("text").value.trim();
  const file = document.getElementById("image").files[0];

  if (!text && !file) return alert("内容か画像を入れてください");

  let image = "";
  if (file) image = await compress(file);

  await addDoc(collection(db, "posts"), {
    name, text, image,
    likes: 0,
    createdAt: Date.now(),
    userId
  });

  document.getElementById("text").value = "";
};

/* 画像圧縮 */
function compress(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        const scale = Math.min(1200 / img.width, 1);
        c.width = img.width * scale;
        c.height = img.height * scale;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        resolve(c.toDataURL("image/jpeg",0.7));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

/* URLパラメータ */
const params = new URLSearchParams(location.search);
const targetId = params.get("id");

/* 表示 */
onSnapshot(collection(db, "posts"), snap => {
  let posts = [];
  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  if (targetId) posts = posts.filter(p => p.id === targetId);

  const mode = document.getElementById("sort").value;
  posts.sort((a,b)=> mode==="like" ? b.likes-a.likes : b.createdAt-a.createdAt);

  list.innerHTML = "";

  posts.forEach(p => {
    const date = new Date(p.createdAt);
    const datetime =
      `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ` +
      `${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;

    const shareUrl = location.origin + location.pathname + "?id=" + p.id;

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <p>${p.text}</p>
      <div class="meta">${p.name}</div>

      <button onclick="like('${p.id}')">❤️ ${p.likes}</button>
      ${p.userId===userId ? `<button onclick="del('${p.id}')">削除</button>` : ""}

      <a href="https://twitter.com/intent/tweet?url=${shareUrl}" target="_blank">
        <img class="share-btn" src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
      </a>

      <div class="datetime">${datetime}</div>
    `;

    list.appendChild(div);
  });
});

/* いいね */
window.like = async id => {
  if (localStorage.getItem("like_"+id)) return;
  await updateDoc(doc(db,"posts",id), { likes: increment(1) });
  localStorage.setItem("like_"+id, "1");
};

/* 削除 */
window.del = async id => {
  if (!confirm("削除する？")) return;
  await deleteDoc(doc(db,"posts",id));
};
</script>

</body>
</html>
