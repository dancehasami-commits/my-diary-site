<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO① タイトル -->
<title>みんなの日記｜匿名で投稿できる日記サイト</title>

<!-- SEO② 説明 -->
<meta name="description" content="匿名で日記を投稿できるシンプルなサイト。画像投稿やいいね機能あり。">

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}
header {
  background: #111;
  color: #fff;
  padding: 30px;
  text-align: center;
}
.banner {
  width: 100%;
  height: 200px;
  background-image: url("banner1.png");
  background-size: cover;
}
.marquee {
  background: black;
  color: lime;
  overflow: hidden;
  font-family: monospace;
  text-shadow: 0 0 8px lime;
}
.marquee p {
  white-space: nowrap;
  display: inline-block;
  padding-left: 100%;
  animation: scroll 15s linear infinite;
}
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
.container {
  display: flex;
  width: 100%;
}
.side { flex: 1.5; }
.main {
  flex: 7;
  background: white;
  padding: 20px;
  box-sizing: border-box;
}
.post {
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ddd;
  position: relative;
}
.post img {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 10px;
}
.meta {
  font-size: 12px;
  color: #666;
}
.datetime {
  font-size: 11px;
  color: #999;
  position: absolute;
  right: 0;
  bottom: 5px;
}
textarea, input, select {
  width: 100%;
  margin-bottom: 5px;
  box-sizing: border-box;
}
#preview {
  width: 150px;
  height: 150px;
  object-fit: cover;
  display: none;
  margin-bottom: 10px;
  border: 1px solid #ccc;
}

/* 投稿ボタン強化 */
#postBtn {
  width: 200%;
  height: 60px;
  font-size: 18px;
  font-weight: bold;
  margin: 10px 0;
}

#cancelBtn {
  display: none;
  margin-bottom: 10px;
}

@media screen and (max-width: 768px) {
  .container { flex-direction: column; }
  .side { display: none; }
  .main { width: 100%; }

  #postBtn {
    width: 100%;
  }
}
</style>
</head>
<body>

<header>
<h1>みんなの日記</h1>

<!-- SEO③ ページ説明 -->
<p>
匿名で日記を書いて共有できるサイトです。画像投稿やいいね機能で気軽に楽しめます。
</p>

</header>

<div class="banner"></div>

<div class="marquee">
  <p id="marqueeText">読み込み中...</p>
</div>

<div class="container">
  <div class="side"></div>

  <div class="main">
    <input type="text" id="name" placeholder="名前">
    <textarea id="text" placeholder="日記を書く"></textarea>

    <input type="file" id="image">
    <img id="preview">
    <button id="cancelBtn">画像を取り消す</button>

    <button id="postBtn">投稿</button>

    <select id="sort">
      <option value="new">最新順</option>
      <option value="like">いいね順</option>
    </select>

    <div style="border-top:2px solid #ddd; margin:20px 0;"></div>

    <section id="list"></section>
  </div>

  <div class="side"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  runTransaction,
  onSnapshot,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATX...",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const preview = document.getElementById("preview");
const cancelBtn = document.getElementById("cancelBtn");

/* 画像プレビュー */
document.getElementById("image").addEventListener("change", () => {
  const file = document.getElementById("image").files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display = "block";
    cancelBtn.style.display = "block";
  };
  reader.readAsDataURL(file);
});

/* 画像取り消し */
cancelBtn.addEventListener("click", () => {
  document.getElementById("image").value = "";
  preview.style.display = "none";
  cancelBtn.style.display = "none";
});

/* 投稿 */
document.getElementById("postBtn").addEventListener("click", async () => {
  const name = document.getElementById("name").value || "名前無し";
  const text = document.getElementById("text").value.trim();
  const file = document.getElementById("image").files[0];

  if (!text && !file) {
    alert("内容か画像を入力してください");
    return;
  }

  let image = "";

  if (file) {
    image = await new Promise(resolve => {
      const r = new FileReader();
      r.onload = e => resolve(e.target.result);
      r.readAsDataURL(file);
    });
  }

  await addDoc(collection(db, "posts"), {
    name,
    text,
    image,
    likes: 0,
    createdAt: Date.now()
  });

  document.getElementById("text").value = "";
  document.getElementById("image").value = "";
  preview.style.display = "none";
  cancelBtn.style.display = "none";
});

/* 表示 */
onSnapshot(collection(db, "posts"), (snap) => {
  let posts = [];
  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  posts.sort((a,b)=>b.createdAt-a.createdAt);

  list.innerHTML = "";

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <p>${p.text}</p>
      <div class="meta">${p.name}</div>
      <button onclick="like('${p.id}')">❤️ ${p.likes}</button>
    `;

    list.appendChild(div);
  });
});

/* いいね */
window.like = async (id) => {
  await updateDoc(doc(db,"posts",id), {
    likes: increment(1)
  });
};
</script>
</body>
</html>
