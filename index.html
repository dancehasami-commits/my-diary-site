<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ SEO① タイトル -->
<title>みんなの日記｜匿名で投稿できる日記サイト</title>

<!-- ✅ SEO② 説明 -->
<meta name="description" content="匿名で日記を投稿できるシンプルなサイト。画像投稿やいいね機能あり。">

<!-- ✅ OGP -->
<meta property="og:title" content="みんなの日記｜匿名で投稿できる日記サイト">
<meta property="og:description" content="匿名で日記を投稿できるシンプルなサイト。画像投稿やいいね機能あり。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dancehasami-commits.github.io/my-diary-site/">

<!-- 👇ここが重要（画像差し替え） -->
<meta property="og:image" content="https://dancehasami-commits.github.io/my-diary-site/trimmed_ogp_image.png">

<meta name="twitter:card" content="summary_large_image">

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}
header {
  background: #111;
  color: #fff;
  padding: 30px;
  text-align: center;
}
.banner {
  width: 100%;
  height: 200px;
  background-image: url("banner1.png");
  background-size: cover;
}
.marquee {
  background: black;
  color: lime;
  overflow: hidden;
  font-family: monospace;
  text-shadow: 0 0 8px lime;
}
.marquee p {
  white-space: nowrap;
  display: inline-block;
  padding-left: 100%;
  animation: scroll 15s linear infinite;
}
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
.container {
  display: flex;
  width: 100%;
}
.side { flex: 1.5; }
.main {
  flex: 7;
  background: white;
  padding: 20px;
  box-sizing: border-box;
}
.post {
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ddd;
  position: relative;
}
.post img {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 10px;
}
.meta {
  font-size: 12px;
  color: #666;
}
.datetime {
  font-size: 11px;
  color: #999;
  position: absolute;
  right: 0;
  bottom: 5px;
}
textarea, input, select {
  width: 100%;
  margin-bottom: 5px;
  box-sizing: border-box;
}
.preview-wrap {
  position: relative;
  width: 150px;
  margin-bottom: 10px;
}
#preview {
  width: 150px;
  height: 150px;
  object-fit: cover;
  display: none;
  border: 1px solid #ccc;
}
#clearBtn {
  position: absolute;
  top: -8px;
  right: -8px;
  background: black;
  color: white;
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
  display: none;
}
#postBtn {
  display: block;
  width: 200%;
  max-width: 400px;
  height: 60px;
  margin: 15px 0;
  font-size: 18px;
  font-weight: bold;
  background: #111;
  color: white;
  border: none;
  cursor: pointer;
}
@media screen and (max-width: 768px) {
  .container { flex-direction: column; }
  .side { display: none; }
  .main { width: 100%; }
  #postBtn { width: 100%; }
}
</style>
</head>
<body>

<header>
<h1>みんなの日記</h1>
<p>
匿名で日記を書いて共有できるサイトです。画像投稿やいいね機能で気軽に楽しめます。
</p>
</header>

<div class="banner"></div>

<div class="marquee">
  <p id="marqueeText">読み込み中...</p>
</div>

<div class="container">
  <div class="side"></div>

  <div class="main">
    <input type="text" id="name" placeholder="名前">
    <textarea id="text" placeholder="日記を書く"></textarea>
    <input type="file" id="image">

    <div class="preview-wrap">
      <img id="preview">
      <button id="clearBtn">×</button>
    </div>

    <button id="postBtn">投稿</button>

    <select id="sort">
      <option value="new">最新順</option>
      <option value="like">いいね順</option>
    </select>

    <div style="border-top:2px solid #ddd; margin:20px 0;"></div>

    <section id="list"></section>
  </div>

  <div class="side"></div>
</div>

<script type="module">
/* ここはあなたの元コードそのまま貼り付けてOK */
</script>

</body>
</html>
