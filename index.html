<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共有日記サイト</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #111;
  color: #fff;
  padding: 30px;
  text-align: center;
}

.banner {
  width: 100%;
  height: 200px;
  background-image: url("banner1.png");
  background-size: cover;
}

/* 電光掲示板 */
.marquee {
  background: black;
  color: lime;
  overflow: hidden;
  font-family: monospace;
  text-shadow: 0 0 8px lime;
}

.marquee p {
  white-space: nowrap;
  display: inline-block;
  padding-left: 100%;
  animation: scroll 15s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* レイアウト */
.container {
  display: flex;
  width: 100%;
}

.side {
  flex: 1.5;
}

.main {
  flex: 7;
  background: white;
  padding: 20px;
  box-sizing: border-box;
}

/* 投稿 */
.post {
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ddd;
}

.post img {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 10px;
}

/* ⭐ 名前＋時間（右揃え） */
.meta {
  font-size: 12px;
  color: #666;
  text-align: right;   /* ←ここが変更点 */
  margin-top: 5px;
}

/* いいね */
.like-btn {
  background: none;
  border: 1px solid #333;
  padding: 5px 10px;
  cursor: pointer;
  margin-top: 5px;
}

.like-btn.liked {
  background: red;
  color: white;
}

/* 入力 */
textarea, input {
  width: 100%;
  margin-bottom: 5px;
}

/* スマホ対応 */
@media screen and (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .side {
    display: none;
  }

  .main {
    width: 100%;
  }
}
</style>
</head>

<body>

<header>
<h1>みんなの日記</h1>
</header>

<div class="banner"></div>

<div class="marquee">
  <p>
    ☆私の家へようこそ　☆みんなで日記共有　☆毎日チェック！　
    　訪問者: <span id="visitCount">000000</span>
  </p>
</div>

<div class="container">

  <div class="side"></div>

  <div class="main">

    <input type="text" id="name" placeholder="名前">
    <input type="file" id="image">
    <textarea id="text" placeholder="日記を書く"></textarea>
    <button onclick="post()">投稿</button>

    <section id="list"></section>

  </div>

  <div class="side"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  runTransaction,
  onSnapshot,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATX-E11u6N_Z4YI_vxW4fsASJeuDHkrX4",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b",
  measurementId: "G-ZVJJKMMYKQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

/* 投稿 */
window.post = async function() {
  const text = document.getElementById("text").value;
  const nameInput = document.getElementById("name").value;
  const file = document.getElementById("image").files[0];

  const name = nameInput.trim() === "" ? "名前無し" : nameInput;

  const now = new Date();
  const time = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  if (file) {
    const reader = new FileReader();

    reader.onload = async function(e) {
      await addDoc(collection(db, "posts"), {
        text,
        name,
        time,
        image: e.target.result,
        likes: 0,
        createdAt: Date.now()
      });
      load();
    };

    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), {
      text,
      name,
      time,
      image: "",
      likes: 0,
      createdAt: Date.now()
    });
    load();
  }
};

/* 表示 */
async function load() {
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "posts"));

  const posts = [];

  snap.forEach(docSnap => {
    posts.push({ id: docSnap.id, ...docSnap.data() });
  });

  posts.sort((a, b) => b.createdAt - a.createdAt);

  posts.forEach(data => {
    const likedKey = "liked_" + data.id;
    const alreadyLiked = localStorage.getItem(likedKey);

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${data.image ? `<img src="${data.image}">` : ""}
      <p>${data.text}</p>

      <div class="meta">
        ${data.name}｜${data.time}
      </div>

      <button class="like-btn ${alreadyLiked ? "liked" : ""}"
        onclick="like('${data.id}')">
        ❤️ いいね ${data.likes || 0}
      </button>

      <button onclick="del('${data.id}')">削除</button>
    `;

    list.appendChild(div);
  });
}

window.del = async function(id) {
  await deleteDoc(doc(db, "posts", id));
  load();
};

/* いいね */
window.like = async function(id) {
  const key = "liked_" + id;

  if (localStorage.getItem(key)) return;

  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    likes: increment(1)
  });

  localStorage.setItem(key, "1");
  load();
};

/* カウンター */
const counterRef = doc(db, "counter", "visit");

async function increaseVisit() {
  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(counterRef);

    if (!snap.exists()) {
      transaction.set(counterRef, { count: 1 });
    } else {
      transaction.update(counterRef, {
        count: snap.data().count + 1
      });
    }
  });
}

if (!sessionStorage.getItem("visited")) {
  increaseVisit();
  sessionStorage.setItem("visited", "1");
}

onSnapshot(counterRef, (snap) => {
  const data = snap.data();
  if (!data) return;

  document.getElementById("visitCount").textContent =
    String(data.count).padStart(6, "0");
});

load();
</script>

</body>
</html>
