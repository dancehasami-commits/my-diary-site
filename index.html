<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共有日記サイト</title>

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }

header {
  background:#111;
  color:#fff;
  padding:30px;
  text-align:center;
}

.banner {
  width:100%;
  height:200px;
  background-image:url("banner1.png");
  background-size:cover;
}

/* 電光掲示板 */
.marquee {
  background:black;
  color:lime;
  overflow:hidden;
  font-family: monospace;
  text-shadow: 0 0 8px lime;
}

.marquee p {
  white-space:nowrap;
  display:inline-block;
  padding-left:100%;
  animation:scroll 15s linear infinite;
}

@keyframes scroll {
  0% { transform:translateX(0); }
  100% { transform:translateX(-100%); }
}

section {
  max-width:800px;
  margin:20px auto;
  background:white;
  padding:20px;
}

.entry img { width:100%; }

.delete-btn {
  background:red;
  color:white;
}
</style>
</head>

<body>

<header>
<h1>みんなの日記</h1>
</header>

<div class="banner"></div>

<!-- 上段テロップ -->
<div class="marquee">
  <p>☆私の家へようこそ　☆みんなで日記共有　☆毎日チェック！</p>
</div>

<!-- ⭐ 訪問者カウンター -->
<div class="marquee" style="margin-top:5px;">
  <p>VISITORS: <span id="visitCount">000000</span></p>
</div>

<section>
<input type="file" id="image">
<textarea id="text"></textarea>
<button onclick="post()">投稿</button>
</section>

<section id="list"></section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  runTransaction,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* Firebase設定 */
const firebaseConfig = {
  apiKey: "AIzaSyATX-E11u6N_Z4YI_vxW4fsASJeuDHkrX4",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b",
  measurementId: "G-ZVJJKMMYKQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   投稿機能
========================= */
const list = document.getElementById("list");

async function load() {
  list.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "posts"));

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${data.text}</p>
      ${data.image ? `<img src="${data.image}">` : ""}
      <button onclick="del('${docSnap.id}')">削除</button>
      <hr>
    `;

    list.appendChild(div);
  });
}

window.post = async function() {
  const text = document.getElementById("text").value;
  const file = document.getElementById("image").files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = async function(e) {
      await addDoc(collection(db, "posts"), {
        text,
        image: e.target.result
      });
      load();
    };

    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), {
      text,
      image: ""
    });
    load();
  }
};

window.del = async function(id) {
  await deleteDoc(doc(db, "posts", id));
  load();
};

/* =========================
   訪問者カウンター
========================= */

const counterRef = doc(db, "counter", "visit");

/* +1（1回だけ） */
async function increaseVisit() {
  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(counterRef);

    if (!snap.exists()) {
      transaction.set(counterRef, { count: 1 });
    } else {
      transaction.update(counterRef, {
        count: snap.data().count + 1
      });
    }
  });
}

/* 二重カウント防止（同タブ） */
if (!sessionStorage.getItem("visited")) {
  increaseVisit();
  sessionStorage.setItem("visited", "1");
}

/* リアルタイム表示 */
onSnapshot(counterRef, (snap) => {
  const data = snap.data();
  if (!data) return;

  document.getElementById("visitCount").textContent =
    String(data.count).padStart(6, "0");
});

/* 初期読み込み */
load();

</script>

</body>
</html>
