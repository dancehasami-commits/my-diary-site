<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共有日記サイト</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #111;
  color: #fff;
  padding: 30px;
  text-align: center;
}

.banner {
  width: 100%;
  height: 200px;
  background-image: url("banner1.png");
  background-size: cover;
}

/* 電光掲示板 */
.marquee {
  background: black;
  color: lime;
  overflow: hidden;
  font-family: monospace;
  text-shadow: 0 0 8px lime;
}

.marquee p {
  white-space: nowrap;
  display: inline-block;
  padding-left: 100%;
  animation: scroll 15s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* レイアウト */
.container {
  display: flex;
  width: 100%;
}

.side { flex: 1.5; }

.main {
  flex: 7;
  background: white;
  padding: 20px;
  box-sizing: border-box;
}

/* 投稿 */
.post {
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ddd;
}

.post img {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 10px;
}

/* メタ */
.meta {
  font-size: 12px;
  color: #666;
  text-align: right;
  margin-top: 5px;
}

/* ボタン */
button {
  margin-top: 5px;
}

/* 入力 */
textarea, input, select {
  width: 100%;
  margin-bottom: 5px;
}

@media screen and (max-width: 768px) {
  .container {
    flex-direction: column;
  }
  .side { display: none; }
}
</style>
</head>

<body>

<header>
<h1>みんなの日記</h1>
</header>

<div class="banner"></div>

<!-- 🌟 電光掲示板 -->
<div class="marquee">
  <p id="marqueeText">読み込み中...</p>
</div>

<div class="container">

  <div class="side"></div>

  <div class="main">

    <input type="text" id="name" placeholder="名前">
    <textarea id="text" placeholder="日記を書く"></textarea>
    <input type="file" id="image">

    <select id="sort">
      <option value="new">最新順</option>
      <option value="like">いいね順</option>
    </select>

    <button id="postBtn">投稿</button>

    <div style="border-top:2px solid #ddd; margin:20px 0;"></div>

    <section id="list"></section>

  </div>

  <div class="side"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  runTransaction,
  onSnapshot,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATX-E11u6N_Z4YI_vxW4fsASJeuDHkrX4",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

/* =========================
   投稿
========================= */
document.getElementById("postBtn").addEventListener("click", post);

async function post() {
  const name = document.getElementById("name").value || "名前無し";
  const text = document.getElementById("text").value;
  const file = document.getElementById("image").files[0];

  let image = "";
  if (file) image = await compress(file);

  await addDoc(collection(db, "posts"), {
    name,
    text,
    image,
    likes: 0,
    createdAt: Date.now()
  });

  document.getElementById("name").value = "";
  document.getElementById("text").value = "";
  document.getElementById("image").value = "";
}

/* 画像圧縮 */
function compress(file) {
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        const scale = Math.min(1200 / img.width, 1);
        c.width = img.width * scale;
        c.height = img.height * scale;

        const ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0, c.width, c.height);

        resolve(c.toDataURL("image/jpeg", 0.7));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

/* =========================
   投稿表示
========================= */
onSnapshot(collection(db, "posts"), (snap) => {
  let posts = [];

  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  const mode = document.getElementById("sort").value;

  if (mode === "like") {
    posts.sort((a,b)=>b.likes-a.likes);
  } else {
    posts.sort((a,b)=>b.createdAt-a.createdAt);
  }

  list.innerHTML = "";

  posts.forEach(p => {
    const liked = localStorage.getItem("like_" + p.id);

    const div = document.createElement("div");
    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <p>${p.text}</p>

      <div class="meta">${p.name}</div>

      <button onclick="like('${p.id}')"
        style="${liked ? 'background:red;color:white;' : ''}">
        ❤️ ${p.likes}
      </button>

      <button onclick="del('${p.id}')">削除</button>

      <hr>
    `;
    list.appendChild(div);
  });
});

/* いいね */
window.like = async (id) => {
  if (localStorage.getItem("like_" + id)) return;

  await updateDoc(doc(db,"posts",id), {
    likes: increment(1)
  });

  localStorage.setItem("like_" + id, "1");
};

/* 削除 */
window.del = async (id) => {
  if (!confirm("削除する？")) return;
  await deleteDoc(doc(db,"posts",id));
};

/* =========================
   👀 訪問者カウンター
========================= */
const counterRef = doc(db,"counter","visit");

async function visit() {
  await runTransaction(db, async (tx) => {
    const s = await tx.get(counterRef);
    if (!s.exists()) {
      tx.set(counterRef,{count:1});
    } else {
      tx.update(counterRef,{count:s.data().count+1});
    }
  });
}

if (!sessionStorage.visited) {
  visit();
  sessionStorage.visited = "1";
}

let visitCount = 0;
onSnapshot(counterRef,(s)=>{
  visitCount = s.data()?.count || 0;
  updateMarquee();
});

/* =========================
   🌙 昼夜電光掲示板
========================= */

const dayMessages = [
"今日もゆるく更新中","日記は気分でOK","いいねは生きる活力","あなたの投稿待ってます","ここはゆるいインターネット",
"誰かがどこかで見ている","毎日がちょっとした記録","思いついたら書くスタイル","訪問ありがとうございます","投稿は自由です"
];

const nightMessages = [
"深夜の投稿率高め","たまにバグります","スクロールすると人生","ここに意味はありません（あるかも）","静かなインターネット",
"データは眠らない","誰かの生活ログ","夜は少しだけ特別","思考が流れる時間","ログは積もっていく"
];

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function getMsg(){
  const h = new Date().getHours();
  return (h>=5 && h<17) ? dayMessages : nightMessages;
}

function updateMarquee(){
  const msgs = getMsg();

  const text =
    `☆${pick(msgs)}　☆${pick(msgs)}　☆${pick(msgs)}　訪問者:${String(visitCount).padStart(6,"0")}　`;

  document.getElementById("marqueeText").textContent = text;
}

setInterval(updateMarquee, 8000);
</script>

</body>
</html>
