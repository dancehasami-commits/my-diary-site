<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共有日記サイト</title>
<style>
/* 角丸をすべて廃止し、直角なデザインに統一 */
body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
header { background: #111; color: #fff; padding: 30px; text-align: center; }
.banner { width: 100%; height: 200px; background-image: url("banner1.png"); background-size: cover; }
.marquee { background: black; color: lime; overflow: hidden; font-family: monospace; text-shadow: 0 0 8px lime; }
.marquee p { white-space: nowrap; display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; }
@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

.container { display: flex; width: 100%; }
.side { flex: 1.5; }
.main { flex: 7; background: white; padding: 20px; box-sizing: border-box; }

/* 投稿（角丸 0） */
.post { 
  margin-bottom: 20px; 
  padding: 15px; 
  border-bottom: 1px solid #ddd; 
  position: relative; 
  background: #fff; 
  border-radius: 0; /* 直角 */
}
.post img { width: 100%; height: auto; display: block; margin-bottom: 10px; border-radius: 0; }
.meta { font-size: 12px; color: #666; font-weight: bold; }
.datetime { font-size: 11px; color: #999; position: absolute; right: 0; bottom: 5px; }

/* 入力パーツ（角丸 0） */
textarea, input, select { 
  width: 100%; 
  margin-bottom: 10px; 
  padding: 10px; 
  box-sizing: border-box; 
  border: 1px solid #ccc; 
  border-radius: 0; 
}

.preview-wrap { position: relative; width: 150px; margin-bottom: 10px; }
#preview { width: 150px; height: 150px; object-fit: cover; display: none; border: 1px solid #ccc; border-radius: 0; }
#clearBtn { 
  position: absolute; top: -8px; right: -8px; 
  background: black; color: white; border: none; 
  border-radius: 0; /* ボタンも直角 */
  width: 24px; height: 24px; cursor: pointer; display: none; 
}

/* 投稿ボタン（過去のデザインに合わせて幅広・直角に） */
#postBtn { 
  display: block; 
  width: 100%; 
  max-width: 400px; 
  height: 60px; 
  margin: 15px 0; 
  font-size: 18px; 
  font-weight: bold; 
  background: #111; 
  color: white; 
  border: none; 
  cursor: pointer; 
  border-radius: 0; 
}

#loadingStatus { text-align: center; padding: 20px; color: #666; font-size: 14px; }

@media screen and (max-width: 768px) { 
  .container { flex-direction: column; } 
  .side { display: none; } 
  .main { width: 100%; } 
  #postBtn { width: 100%; max-width: none; } 
}
</style>
</head>
<body>
<header><h1>みんなの日記</h1></header>
<div class="banner"></div>
<div class="marquee"><p id="marqueeText">読み込み中...</p></div>

<div class="container">
  <div class="side"></div>
  <div class="main">
    <input type="text" id="name" placeholder="名前">
    <textarea id="text" placeholder="日記を書く"></textarea>
    <input type="file" id="image" accept="image/*">
    <div class="preview-wrap">
      <img id="preview"><button id="clearBtn">×</button>
    </div>
    <button id="postBtn" disabled>認証中...</button>

    <label for="sort" style="font-size: 12px;">表示順：</label>
    <select id="sort">
      <option value="createdAt">最新順</option>
      <option value="likes">いいね順</option>
    </select>

    <div style="border-top:2px solid #ddd; margin:20px 0;"></div>
    
    <section id="list"></section>
    <div id="loadingStatus"></div>
  </div>
  <div class="side"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc, runTransaction,
  query, orderBy, limit, getDocs, startAfter, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATX-E11u6N_Z4YI_vxW4fsASJeuDHkrX4",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const list = document.getElementById("list");
const loadingStatus = document.getElementById("loadingStatus");
const postBtn = document.getElementById("postBtn");
const sortSelect = document.getElementById("sort");

let currentUid = null;
let lastVisible = null;
let isLoading = false;
let hasMore = true;

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUid = user.uid;
    postBtn.disabled = false;
    postBtn.textContent = "投稿";
    refreshList();
  } else {
    signInAnonymously(auth).catch(e => alert("認証エラー"));
  }
});

document.getElementById("name").value = localStorage.getItem("savedName") || "";

async function updateVisit() {
  const visitRef = doc(db, "meta", "visits");
  try {
    const result = await runTransaction(db, async (tx) => {
      const snap = await tx.get(visitRef);
      let count = snap.exists() ? snap.data().count + 1 : 1;
      tx.set(visitRef, { count }, { merge: true });
      return count;
    });
    const formatted = String(result).padStart(5, "0");
    document.getElementById("marqueeText").textContent = 
      `☆私の家へようこそ　☆みんなで日記共有　☆毎日チェック！　 訪問者:${formatted}`;
  } catch(e) { console.error(e); }
}
updateVisit();

const input = document.getElementById("image");
const preview = document.getElementById("preview");
const clearBtn = document.getElementById("clearBtn");

input.onchange = () => {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => { preview.src = e.target.result; preview.style.display = "block"; clearBtn.style.display = "block"; };
    reader.readAsDataURL(file);
  }
};
clearBtn.onclick = () => { input.value = ""; preview.style.display = "none"; clearBtn.style.display = "none"; };

postBtn.onclick = async () => {
  const name = document.getElementById("name").value || "名前無し";
  const text = document.getElementById("text").value.trim();
  if (!text && !input.files[0]) return alert("内容か画像を入れてください");

  localStorage.setItem("savedName", name);
  postBtn.disabled = true;

  try {
    // 画像圧縮処理の呼び出し
    let image = input.files[0] ? await compress(input.files[0]) : "";
    
    await addDoc(collection(db, "posts"), {
      name, text, image, likes: 0, createdAt: Date.now(), 
      userId: currentUid 
    });
    location.reload();
  } catch (e) {
    console.error(e);
    alert("投稿に失敗しました。画像が大きすぎる可能性があります。");
    postBtn.disabled = false;
  }
};

/**
 * 画像を圧縮する関数（修正ポイント）
 * 1. 最大幅を400pxに制限（スマホ表示なら十分）
 * 2. JPEG品質を0.5に下げて容量を大幅カット
 */
function compress(file) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      // 最大幅を400pxに制限（Firestoreの1MB制限を回避するため）
      const maxWidth = 400; 
      const s = Math.min(maxWidth / img.width, 1);
      c.width = img.width * s; c.height = img.height * s;
      
      const ctx = c.getContext("2d");
      ctx.drawImage(img, 0, 0, c.width, c.height);
      
      // 品質を0.5(50%)に設定してデータ量を軽量化
      res(c.toDataURL("image/jpeg", 0.5));
    };
    img.src = URL.createObjectURL(file);
  });
}

sortSelect.onchange = () => refreshList();

function refreshList() {
  list.innerHTML = "";
  lastVisible = null;
  hasMore = true;
  loadPosts();
}

async function loadPosts() {
  if (isLoading || !hasMore || !currentUid) return;
  isLoading = true;
  loadingStatus.textContent = "読み込み中...";

  const sortField = sortSelect.value;
  let q = query(collection(db, "posts"), orderBy(sortField, "desc"), limit(10));
  if (lastVisible) q = query(q, startAfter(lastVisible));

  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      hasMore = false;
      loadingStatus.textContent = "すべての投稿を表示しました";
      isLoading = false;
      return;
    }
    lastVisible = snap.docs[snap.docs.length - 1];
    
    snap.forEach(d => {
      const p = { id: d.id, ...d.data() };
      const date = new Date(p.createdAt);
      const datetime =
        `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ` +
        `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
      
      const liked = localStorage.getItem("like_" + p.id);

      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `
        ${p.image ? `<img src="${p.image}">` : ""}
        <p>${p.text}</p>
        <div class="meta">${p.name}</div>
        <button onclick="like('${p.id}', this)" style="border-radius:0; ${liked ? 'background:red;color:white;' : ''}">❤️ <span>${p.likes || 0}</span></button>
        ${p.userId === currentUid ? `<button onclick="del('${p.id}')" style="border-radius:0;">削除</button>` : ""}
        <div class="datetime">${datetime}</div>
      `;
      list.appendChild(div);
    });
  } catch(e) { console.error(e); }

  isLoading = false;
  loadingStatus.textContent = "";
}

window.onscroll = () => {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
    loadPosts();
  }
};

window.like = async (id, btn) => {
  if (localStorage.getItem("like_" + id)) return;
  try {
    await updateDoc(doc(db, "posts", id), { likes: increment(1) });
    localStorage.setItem("like_" + id, "1");
    btn.style.background = "red"; btn.style.color = "white";
    const span = btn.querySelector("span");
    span.textContent = parseInt(span.textContent) + 1;
  } catch(e) { console.error(e); }
};

window.del = async (id) => {
  if (!confirm("削除しますか？")) return;
  try {
    await deleteDoc(doc(db, "posts", id));
    location.reload();
  } catch (e) { alert("失敗しました"); }
};
</script>
</body>
</html>
