<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共有日記サイト</title>
<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}
header {
  background: #111;
  color: #fff;
  padding: 30px;
  text-align: center;
}
.banner {
  width: 100%;
  height: 200px;
  background-image: url("banner1.png");
  background-size: cover;
}
.marquee {
  background: black;
  color: lime;
  overflow: hidden;
  font-family: monospace;
  text-shadow: 0 0 8px lime;
}
.marquee p {
  white-space: nowrap;
  display: inline-block;
  padding-left: 100%;
  animation: scroll 15s linear infinite;
}
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
.container {
  display: flex;
  width: 100%;
}
.side { flex: 1.5; }
.main {
  flex: 7;
  background: white;
  padding: 20px;
  box-sizing: border-box;
}
.post {
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ddd;
  position: relative;
}
.post img {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 10px;
}
.meta {
  font-size: 12px;
  color: #666;
}
.datetime {
  font-size: 11px;
  color: #999;
  position: absolute;
  right: 0;
  bottom: 5px;
}
textarea, input, select {
  width: 100%;
  margin-bottom: 5px;
  box-sizing: border-box;
}
#preview {
  width: 150px;
  height: 150px;
  object-fit: cover;
  display: none;
  margin-bottom: 10px;
  border: 1px solid #ccc;
}
@media screen and (max-width: 768px) {
  .container { flex-direction: column; }
  .side { display: none; }
  .main { width: 100%; }
}
</style>
</head>
<body>
<header>
<h1>みんなの日記</h1>
</header>

<div class="banner"></div>

<div class="marquee">
  <p id="marqueeText">読み込み中...</p>
</div>

<div class="container">
  <div class="side"></div>

  <div class="main">
    <input type="text" id="name" placeholder="名前">
    <textarea id="text" placeholder="日記を書く"></textarea>
    <input type="file" id="image">
    <img id="preview">

    <!-- 👇ここを変更：投稿ボタンを先に -->
    <button id="postBtn">投稿</button>

    <select id="sort">
      <option value="new">最新順</option>
      <option value="like">いいね順</option>
    </select>

    <div style="border-top:2px solid #ddd; margin:20px 0;"></div>

    <section id="list"></section>
  </div>

  <div class="side"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  runTransaction,
  onSnapshot,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATX-E11u6N_Z4YI_vxW4fsASJeuDHkrX4",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const list = document.getElementById("list");

let userId = localStorage.getItem("userId");
if (!userId) {
  userId = crypto.randomUUID();
  localStorage.setItem("userId", userId);
}

const visitRef = doc(db, "meta", "visits");

async function updateVisit() {
  const result = await runTransaction(db, async (tx) => {
    const snap = await tx.get(visitRef);
    let count = 1;

    if (!snap.exists()) {
      tx.set(visitRef, { count: 1 });
    } else {
      count = snap.data().count + 1;
      tx.update(visitRef, { count });
    }

    return count;
  });

  const formatted = String(result).padStart(5, "0");

  document.getElementById("marqueeText").textContent =
    `☆私の家へようこそ　☆みんなで日記共有　☆毎日チェック！　 訪問者:${formatted}`;
}

updateVisit();

document.getElementById("image").addEventListener("change", previewImage);

function previewImage() {
  const file = document.getElementById("image").files[0];
  const preview = document.getElementById("preview");

  if (!file) {
    preview.style.display = "none";
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    preview.src = e.target.result;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);
}

document.getElementById("postBtn").addEventListener("click", post);

async function post() {
  const name = document.getElementById("name").value || "名前無し";
  const text = document.getElementById("text").value;
  const file = document.getElementById("image").files[0];

  let image = "";
  if (file) image = await compress(file);

  await addDoc(collection(db, "posts"), {
    name,
    text,
    image,
    likes: 0,
    createdAt: Date.now(),
    userId: userId
  });

  document.getElementById("name").value = "";
  document.getElementById("text").value = "";
  document.getElementById("image").value = "";
  document.getElementById("preview").style.display = "none";
}

function compress(file) {
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        const scale = Math.min(1200 / img.width, 1);
        c.width = img.width * scale;
        c.height = img.height * scale;
        const ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL("image/jpeg", 0.7));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

onSnapshot(collection(db, "posts"), (snap) => {
  let posts = [];
  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  const mode = document.getElementById("sort").value;

  if (mode === "like") {
    posts.sort((a,b)=>b.likes-a.likes);
  } else {
    posts.sort((a,b)=>b.createdAt-a.createdAt);
  }

  list.innerHTML = "";

  posts.forEach(p => {
    const date = new Date(p.createdAt);
    const datetime =
      `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ` +
      `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;

    const liked = localStorage.getItem("like_" + p.id);
    const isMine = p.userId === userId;

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <p>${p.text}</p>
      <div class="meta">${p.name}</div>
      <button onclick="like('${p.id}')"
        style="${liked ? 'background:red;color:white;' : ''}">
        ❤️ ${p.likes}
      </button>
      ${isMine ? `<button onclick="del('${p.id}')">削除</button>` : ""}
      <div class="datetime">${datetime}</div>
    `;

    list.appendChild(div);
  });
});

window.like = async (id) => {
  if (localStorage.getItem("like_" + id)) return;
  await updateDoc(doc(db,"posts",id), {
    likes: increment(1)
  });
  localStorage.setItem("like_" + id, "1");
};

window.del = async (id) => {
  if (!confirm("削除する？")) return;
  await deleteDoc(doc(db,"posts",id));
};
</script>
</body>
</html>
