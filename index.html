<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共有日記サイト - セキュリティ強化版</title>
<style>
body { font-family: sans-serif; margin: 0; background: #f5f5f5; color: #333; }
header { background: #111; color: #fff; padding: 30px; text-align: center; }
.banner { width: 100%; height: 200px; background-image: url("banner1.png"); background-size: cover; background-position: center; }
.marquee { background: black; color: lime; overflow: hidden; font-family: monospace; text-shadow: 0 0 8px lime; padding: 5px 0; }
.marquee p { white-space: nowrap; display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; margin: 0; }
@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

.container { display: flex; width: 100%; }
.side { flex: 1.5; }
.main { flex: 7; background: white; padding: 20px; box-sizing: border-box; min-height: 100vh; }

/* 投稿フォーム */
.input-area { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 30px; }
textarea, input[type="text"] { width: 100%; margin-bottom: 10px; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
input[type="file"] { margin-bottom: 10px; }

/* 投稿カード */
.post { margin-bottom: 25px; padding: 20px; border-radius: 12px; position: relative; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #eee; }
.post img { width: 100%; height: auto; display: block; margin-bottom: 15px; border-radius: 8px; }
.post p { line-height: 1.6; margin: 0 0 10px 0; white-space: pre-wrap; }
.meta { font-size: 13px; color: #555; font-weight: bold; display: flex; align-items: center; gap: 10px; }
.datetime { font-size: 11px; color: #999; margin-top: 5px; }

/* ボタン類 */
button { cursor: pointer; transition: 0.2s; border: none; border-radius: 6px; }
#postBtn { display: block; width: 100%; max-width: 400px; height: 50px; margin: 10px auto; font-size: 18px; font-weight: bold; background: #111; color: white; }
#postBtn:hover { background: #444; }
.like-btn { background: #f0f0f0; padding: 5px 12px; font-size: 14px; border: 1px solid #ddd; }
.del-btn { background: #ff4d4d; color: white; padding: 5px 12px; font-size: 14px; margin-left: 10px; }

.preview-wrap { position: relative; width: 150px; margin-bottom: 10px; }
#preview { width: 150px; height: 150px; object-fit: cover; display: none; border: 1px solid #ccc; border-radius: 4px; }
#clearBtn { position: absolute; top: -8px; right: -8px; background: black; color: white; border-radius: 50%; width: 24px; height: 24px; display: none; }
#loadingStatus { text-align: center; padding: 20px; color: #888; }

@media screen and (max-width: 768px) { .container { flex-direction: column; } .side { display: none; } .main { width: 100%; } }
</style>
</head>
<body>

<header><h1>みんなの日記</h1></header>
<div class="banner"></div>
<div class="marquee"><p id="marqueeText">読み込み中...</p></div>

<div class="container">
  <div class="side"></div>
  <div class="main">
    <div class="input-area">
      <input type="text" id="name" placeholder="お名前">
      <textarea id="text" placeholder="今何してる？（日記を書く）" rows="3"></textarea>
      <input type="file" id="image" accept="image/*">
      <div class="preview-wrap">
        <img id="preview"><button id="clearBtn">×</button>
      </div>
      <button id="postBtn">投稿する</button>
    </div>

    <div style="border-top:2px solid #eee; margin:20px 0;"></div>
    
    <section id="list"></section>
    <div id="loadingStatus">読み込み中...</div>
  </div>
  <div class="side"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc, runTransaction,
  query, orderBy, limit, getDocs, startAfter, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATX-E11u6N_Z4YI_vxW4fsASJeuDHkrX4",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const list = document.getElementById("list");
const loadingStatus = document.getElementById("loadingStatus");

// ユーザーIDの管理（一度決まったら固定）
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = crypto.randomUUID();
  localStorage.setItem("userId", userId);
}

// 最後に使った名前を保持
document.getElementById("name").value = localStorage.getItem("userName") || "";

// --- 訪問者数 ---
async function updateVisit() {
  const visitRef = doc(db, "meta", "visits");
  try {
    const result = await runTransaction(db, async (tx) => {
      const snap = await tx.get(visitRef);
      let count = snap.exists() ? snap.data().count + 1 : 1;
      tx.set(visitRef, { count }, { merge: true });
      return count;
    });
    document.getElementById("marqueeText").textContent = `☆みんなで日記共有中！ 累計訪問者:${String(result).padStart(5, "0")}人`;
  } catch (e) { console.error(e); }
}
updateVisit();

// --- 画像プレビュー ---
const imageInput = document.getElementById("image");
const preview = document.getElementById("preview");
const clearBtn = document.getElementById("clearBtn");

imageInput.onchange = () => {
  const file = imageInput.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => { 
      preview.src = e.target.result; 
      preview.style.display = "block"; 
      clearBtn.style.display = "block"; 
    };
    reader.readAsDataURL(file);
  }
};
clearBtn.onclick = () => { imageInput.value = ""; preview.style.display = "none"; clearBtn.style.display = "none"; };

// --- 投稿 ---
document.getElementById("postBtn").onclick = async () => {
  const name = document.getElementById("name").value || "名無しさん";
  const text = document.getElementById("text").value.trim();
  
  if (!text && !imageInput.files[0]) return alert("日記の内容か画像を入れてね！");

  localStorage.setItem("userName", name); // 名前を保存
  document.getElementById("postBtn").disabled = true;
  document.getElementById("postBtn").textContent = "送信中...";

  try {
    let image = imageInput.files[0] ? await compress(imageInput.files[0]) : "";
    await addDoc(collection(db, "posts"), {
      name, text, image, likes: 0, createdAt: Date.now(), userId: userId
    });
    location.reload();
  } catch (e) {
    alert("投稿に失敗しました。ルールを確認してください。");
    document.getElementById("postBtn").disabled = false;
  }
};

function compress(file) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      const s = Math.min(800 / img.width, 1);
      c.width = img.width * s; c.height = img.height * s;
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL("image/jpeg", 0.6));
    };
    img.src = URL.createObjectURL(file);
  });
}

// --- 無限スクロール読み込み ---
let lastVisible = null;
let isLoading = false;
let hasMore = true;

async function loadPosts() {
  if (isLoading || !hasMore) return;
  isLoading = true;
  loadingStatus.textContent = "過去の日記を読み込み中...";

  let q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(10));
  if (lastVisible) q = query(q, startAfter(lastVisible));

  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      hasMore = false;
      loadingStatus.textContent = "これ以上日記はありません";
      isLoading = false;
      return;
    }

    lastVisible = snap.docs[snap.docs.length - 1];
    
    snap.forEach(d => {
      const p = { id: d.id, ...d.data() };
      const date = new Date(p.createdAt);
      const timeStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
      const liked = localStorage.getItem("like_" + p.id);

      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `
        ${p.image ? `<img src="${p.image}">` : ""}
        <p>${p.text}</p>
        <div class="meta">
          <span>👤 ${p.name}</span>
          <button class="like-btn" onclick="like('${p.id}', this)" ${liked ? 'style="background:#ffcccc;border-color:red;"' : ''}>
            ❤️ <span>${p.likes || 0}</span>
          </button>
          ${p.userId === userId ? `<button class="del-btn" onclick="del('${p.id}')">削除</button>` : ""}
        </div>
        <div class="datetime">${timeStr}</div>
      `;
      list.appendChild(div);
    });
  } catch (e) {
    console.error(e);
    loadingStatus.textContent = "エラーが発生しました";
  }

  isLoading = false;
}

loadPosts();

window.onscroll = () => {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
    loadPosts();
  }
};

// --- アクション (セキュリティ考慮) ---
window.like = async (id, btn) => {
  if (localStorage.getItem("like_" + id)) return;
  try {
    await updateDoc(doc(db, "posts", id), { likes: increment(1) });
    localStorage.setItem("like_" + id, "1");
    btn.style.background = "#ffcccc";
    btn.style.borderColor = "red";
    const span = btn.querySelector("span");
    span.textContent = parseInt(span.textContent) + 1;
  } catch (e) {
    alert("いいねに失敗しました。サーバーの制限により作成者以外は変更できない設定かもしれません。");
  }
};

window.del = async (id) => {
  if (!confirm("自分の投稿を削除しますか？")) return;
  try {
    await deleteDoc(doc(db, "posts", id));
    location.reload();
  } catch (e) {
    alert("権限がありません。自分の投稿以外は削除できません。");
  }
};
</script>
</body>
</html>
