<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共有日記サイト</title>

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:30px; text-align:center; }

.banner {
  width:100%;
  height:200px;
  background-image:url("banner1.png");
  background-size:cover;
}

.marquee {
  background:black;
  color:lime;
  overflow:hidden;
}

.marquee p {
  white-space:nowrap;
  display:inline-block;
  padding-left:100%;
  animation:scroll 15s linear infinite;
}

@keyframes scroll {
  0% { transform:translateX(0); }
  100% { transform:translateX(-100%); }
}

section {
  max-width:800px;
  margin:20px auto;
  background:white;
  padding:20px;
}

.entry img { width:100%; }
.delete-btn { background:red; color:white; }
</style>
</head>

<body>

<header>
<h1>みんなの日記</h1>
</header>

<div class="banner"></div>

<div class="marquee">
<p>☆私の家へようこそ　☆みんなで日記共有　☆毎日チェック！</p>
</div>

<section>
<input type="file" id="image">
<textarea id="text"></textarea>
<button onclick="post()">投稿</button>
</section>

<section id="list"></section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ✅ あなたの設定（差し替え済み） */
const firebaseConfig = {
  apiKey: "AIzaSyATX-E11u6N_Z4YI_vxW4fsASJeuDHkrX4",
  authDomain: "arigatou-25a5b.firebaseapp.com",
  projectId: "arigatou-25a5b",
  storageBucket: "arigatou-25a5b.firebasestorage.app",
  messagingSenderId: "514833999618",
  appId: "1:514833999618:web:d44507b9a99d76d2fd841b",
  measurementId: "G-ZVJJKMMYKQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

async function load() {
  list.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "posts"));
  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const div = document.createElement("div");
    div.innerHTML = `
      <p>${data.text}</p>
      ${data.image ? `<img src="${data.image}">` : ""}
      <button onclick="del('${docSnap.id}')">削除</button>
      <hr>
    `;
    list.appendChild(div);
  });
}

window.post = async function() {
  const text = document.getElementById("text").value;
  const file = document.getElementById("image").files[0];

  let imageData = "";

  if (file) {
    const reader = new FileReader();
    reader.onload = async function(e) {
      imageData = e.target.result;
      await addDoc(collection(db, "posts"), { text, image: imageData });
      load();
    };
    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), { text, image: "" });
    load();
  }
};

window.del = async function(id) {
  await deleteDoc(doc(db, "posts", id));
  load();
};

load();
</script>

</body>
</html>
